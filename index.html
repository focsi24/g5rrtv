<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Parzivalled — всі посилання" />
  <title>Parzivalled</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
    :root {
      --blue: #0057B7;
      --yellow: #FFD700;
      --bg: #05050f;
      --surface: #0d0d20;
      --text: #f0f0ff;
      --muted: rgba(240,240,255,0.45);
    }
 
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Onest', sans-serif;
      overflow-x: hidden;
    }
 
    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
    }
 
    /* ── BACKGROUND GLOW ── */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .bg-glow span {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
      will-change: transform;
    }
    .bg-glow span:nth-child(1) {
      width: 600px; height: 600px;
      background: var(--blue);
      top: -150px; left: -150px;
      animation: drift1 16s ease-in-out infinite alternate;
    }
    .bg-glow span:nth-child(2) {
      width: 500px; height: 500px;
      background: var(--yellow);
      bottom: -120px; right: -100px;
      animation: drift2 12s ease-in-out infinite alternate;
      animation-delay: -5s;
    }
    .bg-glow span:nth-child(3) {
      width: 300px; height: 300px;
      background: #6040ff;
      top: calc(50% - 150px); left: calc(50% - 150px);
      animation: drift3 10s ease-in-out infinite alternate;
      animation-delay: -3s;
    }
    @keyframes drift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(50px, 40px) scale(1.1); }
    }
    @keyframes drift2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-40px, -30px) scale(1.08); }
    }
    @keyframes drift3 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, -25px) scale(1.12); }
    }
 
    /* ── FLAG STRIPE (декор) ── */
    .flag-stripe {
      position: fixed; top: 0; left: 0; right: 0; height: 4px; z-index: 100;
      background: linear-gradient(90deg, var(--blue) 50%, var(--yellow) 50%);
    }
 
    /* ── LAYOUT ── */
    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px 48px;
      gap: 0;
    }
 
    /* ── AVATAR ── */
    .avatar-wrap {
      position: relative; margin-bottom: 28px;
      opacity: 0; animation: fadeUp 0.7s 0.1s ease forwards;
    }
    .avatar-ring {
      width: 88px; height: 88px; border-radius: 50%;
      background: conic-gradient(var(--yellow) 0deg, var(--blue) 180deg, var(--yellow) 360deg);
      padding: 3px;
      animation: spin 8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
    }
 
    /* ── NAME ── */
    .name {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 10px;
      opacity: 0; animation: fadeUp 0.7s 0.2s ease forwards;
    }
    .name span {
      background: linear-gradient(100deg, var(--yellow) 0%, #fff 45%, var(--blue) 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
 
    .bio {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 40px;
      letter-spacing: 0.04em;
      opacity: 0; animation: fadeUp 0.7s 0.3s ease forwards;
    }
 
    /* ── LINKS ── */
    .links {
      display: flex; flex-direction: column; gap: 12px;
      width: 100%; max-width: 360px;
    }
 
    .btn {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 20px;
      border-radius: 16px;
      text-decoration: none;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
      position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      opacity: 0;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.25s ease;
    }
    .btn:hover { transform: translateY(-3px) scale(1.01); }
    .btn:hover::before { background: rgba(255,255,255,0.07); }
    .btn:active { transform: scale(0.97); }
 
    .btn svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; position: relative; z-index: 1; }
    .btn-label { position: relative; z-index: 1; }
 
    .btn:nth-child(1) { animation: fadeUp 0.6s 0.4s ease forwards; }
    .btn:nth-child(2) { animation: fadeUp 0.6s 0.5s ease forwards; }
    .btn:nth-child(3) { animation: fadeUp 0.6s 0.6s ease forwards; }
    .btn:nth-child(4) { animation: fadeUp 0.6s 0.7s ease forwards; }
 
    .yt  { background: linear-gradient(135deg, #c4000a 0%, #ff2200 100%); box-shadow: 0 8px 30px rgba(255,34,0,0.25); }
    .tg  { background: linear-gradient(135deg, #006aa8 0%, #29b6f6 100%); box-shadow: 0 8px 30px rgba(41,182,246,0.2); }
    .tt  { background: linear-gradient(135deg, #111 0%, #2a2a2a 100%); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
    .ig  { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); box-shadow: 0 8px 30px rgba(253,29,29,0.2); }
 
    /* ── FOOTER ── */
    .footer {
      margin-top: 44px;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      opacity: 0; animation: fadeUp 0.6s 0.9s ease forwards;
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── THEME TOGGLE ── */
    .theme-btn {
      position: fixed; top: 18px; right: 18px; z-index: 200;
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .theme-btn:hover { background: rgba(255,255,255,0.1); }
 
    /* ── LIGHT THEME ── */
    body.light {
      --bg: #f4f4f8;
      --surface: #fff;
      --text: #0a0a1a;
      --muted: rgba(10,10,26,0.45);
    }
    body.light .bg-glow span { opacity: 0.08; }
    body.light .flag-stripe { opacity: 0.9; }
  </style>
</head>
