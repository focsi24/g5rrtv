<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parzivalled — Live Stats</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-overlay: rgba(0, 0, 10, 0.15); 
      --card-bg: rgba(5, 5, 25, 0.92);
      --card-border: rgba(255, 255, 255, 0.35);
      --text-main: #ffffff;
    }

    [data-theme="light"] {
      --bg-overlay: rgba(255, 255, 245, 0.1);
      --card-bg: rgba(255, 255, 255, 0.95);
      --card-border: rgba(0, 87, 183, 0.2);
      --text-main: #001a33;
    }

    body {
      height: 100vh; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      background: #000;
    }

    #flagCanvas { position: fixed; inset: 0; z-index: 0; }
    .overlay { position: fixed; inset: 0; background: var(--bg-overlay); z-index: 1; pointer-events: none; }

    .theme-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--card-bg); border: 1px solid var(--card-border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .content {
      position: relative; z-index: 10;
      background: var(--card-bg);
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--card-border);
      border-radius: 40px; padding: 35px;
      width: 90%; max-width: 380px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      color: var(--text-main);
    }

    h1 {
      font-size: 2.3rem; font-weight: 900; margin-bottom: 35px;
      background: linear-gradient(90deg, #FFD700, #fff, #4da6ff, #FFD700);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      background-size: 200% auto; animation: shine 3s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }

    .links { display: flex; flex-direction: column; gap: 16px; }
    
    .btn {
      padding: 16px;
      border-radius: 20px; 
      color: #fff; 
      text-decoration: none;
      font-weight: 700; 
      font-size: 1.2rem; 
      transition: 0.3s ease;
      display: flex;
      align-items: center;
      gap: 15px;
      position: relative;
    }
    .btn svg { width: 28px; height: 28px; fill: currentColor; flex-shrink: 0; }
    .btn:active { transform: scale(0.96); }

    .yt { background-color: #ff0000; }
    .tg { background-color: #0088cc; }
    .tt { background-color: #010101; border: 1px solid #333; }
    .ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

  </style>
</head>
<body>

  <canvas id="flagCanvas"></canvas>
  <div class="overlay"></div>

  <button class="theme-toggle" id="themeBtn">🌙</button>

  <div class="content">
    <h1>Parzivalled</h1>

  </div>

  <script>
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
      const doc = document.documentElement;
      if (doc.getAttribute('data-theme') === 'dark') {
        doc.setAttribute('data-theme', 'light');
        themeBtn.textContent = '☀️';
      } else {
        doc.setAttribute('data-theme', 'dark');
        themeBtn.textContent = '🌙';
      }
    });

    const canvas = document.getElementById('flagCanvas');
    const ctx = canvas.getContext('2d');
    let time = 0;

    function draw() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const rows = 12; const cols = 18;
      const w = canvas.width / cols; const h = canvas.height / rows;

      for(let r = 0; r < rows; r++) {
        for(let c = 0; c < cols; c++) {
          const wave = Math.sin(c * 0.4 + time) * 20;
          ctx.fillStyle = (r < rows/2) ? '#0055ff' : '#ffea00'; 
          ctx.globalAlpha = 0.85; 
          ctx.fillRect(c * w, r * h + wave, w + 1, h + 1);
        }
      }
      time += 0.04;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
